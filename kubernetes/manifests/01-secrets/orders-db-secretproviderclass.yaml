apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: orders-db-secret-provider
  namespace: retail
spec:
  provider: aws
  parameters:
    usePodIdentity: "true"
    objects: |
      - objectName: "ausmart-dev/rds/orders-credentials"
        objectType: "secretsmanager"
        jmesPath:
          - path: username
            objectAlias: db-username
          - path: password
            objectAlias: db-password
          - path: host
            objectAlias: db-host
          - path: port
            objectAlias: db-port
  secretObjects:
    - secretName: orders-db-credentials
      type: Opaque
      data:
        - objectName: db-username
          key: username
        - objectName: db-password
          key: password
        - objectName: db-host
          key: host
        - objectName: db-port
          key: port
