replicaCount: 1

image:
  repository: public.ecr.aws/aws-containers/retail-store-sample-cart
  tag: "0.8.3"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 256m
    memory: 512Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

serviceAccount:
  create: true
  name: cart-sa
  annotations: {}

config:
  CARTS_DYNAMODB_TABLENAME: "Items"
  CARTS_DYNAMODB_CREATETABLE: "false"
  AWS_DEFAULT_REGION: "ap-southeast-2"
  SERVER_PORT: "8080"

probes:
  readiness:
    path: /actuator/health
    port: 8080
    initialDelaySeconds: 15
    periodSeconds: 10
  liveness:
    path: /actuator/health
    port: 8080
    initialDelaySeconds: 30
    periodSeconds: 15
