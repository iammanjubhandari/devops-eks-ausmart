replicaCount: 1

image:
  repository: public.ecr.aws/aws-containers/retail-store-sample-orders
  tag: "0.8.3"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 256m
    memory: 512Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

serviceAccount:
  create: true
  name: orders-sa
  annotations: {}

secrets:
  enabled: true
  secretProviderClass: orders-db-secret-provider
  secretName: orders-db-credentials

config:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://ausmart-dev-postgres.xxxxx.ap-southeast-2.rds.amazonaws.com:5432/orders"
  DB_HOST: "ausmart-dev-postgres.xxxxx.ap-southeast-2.rds.amazonaws.com"
  DB_PORT: "5432"
  DB_NAME: "orders"
  SERVER_PORT: "8080"

probes:
  readiness:
    path: /actuator/health
    port: 8080
    initialDelaySeconds: 15
    periodSeconds: 10
  liveness:
    path: /actuator/health
    port: 8080
    initialDelaySeconds: 30
    periodSeconds: 15
